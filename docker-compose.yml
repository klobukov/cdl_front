services:
  # Веб-сервер с PHP и Apache
  php:
    image: php:8.2-apache
    container_name: cdl_php
    ports:
      - "8000:80"  # Снаружи порт 8000, внутри контейнера 80
    volumes:
      - ./:/var/www/html  # Монтируем всю папку проекта в корень веб-сервера
    environment:
      PHP_DISPLAY_ERRORS: 1
      PHP_ERROR_REPORTING: E_ALL
    # Дополнительно ставим расширение mysqli для работы с БД
    command: bash -c "docker-php-ext-install mysqli && apache2-foreground"

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: cdl_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cdl
    ports:
      - "3307:3306"  # Чтобы не конфликтовать с локальным MySQL, если он есть
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
      - ./services.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:
